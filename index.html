<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Timetable</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>School Timetable</h1>

<button id="settingsBtn">⚙ Settings</button>

</header>

<main>

<section id="viewer">

<div class="card">

<p id="datetime"></p>

<h2>Current Class</h2>
<div id="currentClass" class="classBox"></div>

<h3>Next Class</h3>
<div id="nextClass" class="classBox"></div>

<label>Day Progress</label>
<progress id="dayProgress" max="100"></progress>

<label>Period Progress</label>
<progress id="periodProgress" max="100"></progress>

</div>

</section>

<section id="settings" class="hidden">

<h2>Timetable Settings</h2>

<h3>Import from Calendar (.ICS)</h3>

<input type="file" id="icsUpload" accept=".ics">

<hr>

<h3>Manual Timetable</h3>

<div id="editor"></div>

<button id="saveBtn">Save Timetable</button>

<button id="resetBtn">Reset Timetable</button>

</section>

</main>

<script src="schedule.js"></script>
<script src="app.js"></script>

</body>
</html>
